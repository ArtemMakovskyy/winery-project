management:
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: full

  observations:
    key-values:
      application: winery-admin-ui
    http:
      server:
        enabled: true
      client:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    zipkin:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
          - loggers

  endpoint:
    health:
      show-details: always

  metrics:
    enable:
      all: true
    distribution:
      percentiles-histogram:
        all: true
        http.server.requests: true
        http.client.requests: true

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: info

info:
  app:
    name: "winery-admin-ui"
    version: "0.0.1-SNAPSHOT"
    description: "BFF (Backend-for-Frontend) application for wine store administration. Provides a thin-client UI for managers and administrators using Spring MVC, Thymeleaf, and OpenFeign."
