<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Manage Wines')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main>

    <header>
        <h2>Manage Wines</h2>
    </header>

    <section>
        <div th:replace="~{fragments/layout :: alerts}"></div>
    </section>

    <section>
        <h3>Create New Wine</h3>

        <form method="post" th:action="@{/ui/wines}" th:object="${wine}">

            <div class="form-group">
                <label for="vendorCode">Vendor Code</label>
                <input id="vendorCode" name="vendorCode"
                       th:value="*{vendorCode} ?: 'MSD 2025'"/>
                <span class="error-message" th:errors="*{vendorCode}"></span>
            </div>

            <div class="form-group">
                <label for="qualityLevel">Quality Level</label>
                <input id="qualityLevel" name="qualityLevel"
                       th:value="*{qualityLevel} ?: 'Premium'"/>
            </div>

            <div class="form-group">
                <label for="reserveType">Reserve Type</label>
                <input id="reserveType" name="reserveType"
                       th:value="*{reserveType} ?: 'Limited Edition Wine'"/>
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" name="name"
                       th:value="*{name} ?: 'Prince Trubetskoi Select Riesling'"/>
                <span class="error-message" th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="shortName">Short Name</label>
                <input id="shortName" name="shortName"
                       th:value="*{shortName} ?: 'Prince Trubetskoi'"/>
            </div>

            <div class="form-group">
                <label for="year">Year</label>
                <input id="year" name="year" type="number"
                       th:value="*{year} ?: 2017"/>
            </div>

            <div class="form-group">
                <label for="tasteWine">Taste Wine</label>
                <input id="tasteWine" name="tasteWine"
                       th:value="*{tasteWine} ?: 'fish'"/>
            </div>

            <div class="form-group">
                <label for="price">Price</label>
                <input id="price" name="price" type="number" step="0.01"
                       th:value="*{price} ?: 25.59"/>
                <span class="error-message" th:errors="*{price}"></span>
            </div>

            <div class="form-group">
                <label for="grape">Grape</label>
                <input id="grape" name="grape"
                       th:value="*{grape} ?: 'Riesling'"/>
            </div>

            <div class="form-group">
                <label for="isDecantation">Decantation</label>
                <select id="isDecantation" name="isDecantation">
                    <option value="false" th:selected="*{isDecantation} == false">false</option>
                    <option value="true" th:selected="*{isDecantation} == true">true</option>
                </select>
            </div>

            <div class="form-group">
                <label for="wineType">Wine Type</label>
                <select id="wineType" name="wineType">
                    <option value="DRY" th:selected="*{wineType} == 'DRY'">DRY</option>
                    <option value="SEMI_DRY" th:selected="*{wineType} == 'SEMI_DRY'">SEMI_DRY</option>
                    <option value="MEDIUM_SWEET" th:selected="*{wineType} == 'MEDIUM_SWEET'">MEDIUM_SWEET</option>
                    <option value="SWEET" th:selected="*{wineType} == 'SWEET'">SWEET</option>
                </select>
            </div>

            <div class="form-group">
                <label for="strengthFrom">Strength From</label>
                <input id="strengthFrom" name="strengthFrom" type="number" step="0.1"
                       th:value="*{strengthFrom} ?: 10.9"/>
            </div>

            <div class="form-group">
                <label for="strengthTo">Strength To</label>
                <input id="strengthTo" name="strengthTo" type="number" step="0.1"
                       th:value="*{strengthTo} ?: 11.8"/>
            </div>

            <div class="form-group">
                <label for="wineColor">Wine Color</label>
                <select id="wineColor" name="wineColor">
                    <option value="WHITE" th:selected="*{wineColor} == 'WHITE'">WHITE</option>
                    <option value="RED" th:selected="*{wineColor} == 'RED'">RED</option>
                    <option value="ROSE" th:selected="*{wineColor} == 'ROSE'">ROSE</option>
                </select>
            </div>

            <div class="form-group">
                <label for="colorDescribing">Color Describing</label>
                <input id="colorDescribing" name="colorDescribing"
                       th:value="*{colorDescribing} ?: 'Deep yellow with greenish hues'"/>
            </div>

            <div class="form-group">
                <label for="taste">Taste</label>
                <textarea id="taste" name="taste" rows="2"
                          th:text="*{taste} ?: 'Delicate...'"></textarea>
            </div>

            <div class="form-group">
                <label for="aroma">Aroma</label>
                <textarea id="aroma" name="aroma" rows="2"
                          th:text="*{aroma} ?: 'Soft...'"></textarea>
            </div>

            <div class="form-group">
                <label for="gastronomy">Gastronomy</label>
                <textarea id="gastronomy" name="gastronomy" rows="2"
                          th:text="*{gastronomy} ?: 'Goes well...'"></textarea>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3"
                          th:text="*{description} ?: 'Elegant...'"></textarea>
            </div>

            <div class="form-group">
                <label for="pictureLink">Picture Link</label>
                <input id="pictureLink" name="pictureLink"
                       th:value="*{pictureLink} ?: 'api/images/wine/default.jpg'"/>
            </div>

            <div class="form-group">
                <label for="pictureLink2">Picture Link 2</label>
                <input id="pictureLink2" name="pictureLink2"
                       th:value="*{pictureLink2} ?: 'api/images/wine/default_back.jpg'"/>
            </div>

            <button type="submit">Create Wine</button>

        </form>
    </section>

    <hr/>

    <section>
        <h3>Delete Wine</h3>

        <form method="post" th:action="@{/ui/wines/delete}">
            <div class="form-group">
                <label for="wineId">Wine ID</label>
                <input id="wineId" name="wineId" type="number"/>
            </div>
            <button type="submit">Delete</button>
        </form>
    </section>

</main>

</body>
</html>
