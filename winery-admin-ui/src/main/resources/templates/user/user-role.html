<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Manage Users')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2>Update User Role</h2>
<div th:replace="~{fragments/layout :: alerts}"></div>

<form method="post" th:action="@{/ui/users/role}" th:object="${form}">
    <div>
        <label for="userId">User ID</label>
        <input id="userId" type="number" required th:field="*{userId}"/>
        <span class="error-message"
              th:if="${#fields.hasErrors('userId')}"
              th:errors="*{userId}"></span>
    </div>

    <div>
        <label for="role">Role</label>
        <select id="role" required th:field="*{role}">
            <option value="">-- Select Role --</option>
            <option value="ROLE_CUSTOMER">CUSTOMER</option>
            <option value="ROLE_MANAGER">MANAGER</option>
            <option value="ROLE_ADMIN">ADMIN</option>
        </select>
        <span class="error-message"
              th:if="${#fields.hasErrors('role')}"
              th:errors="*{role}"></span>
    </div>

    <button type="submit">Update Role</button>
</form>

<div th:if="${user}">
    <h3>Updated User Info</h3>
    <p>User: <span th:text="${user.email}"></span></p>
    <p>Roles: <span th:text="${user.roles}"></span></p>
</div>

</body>
</html>
