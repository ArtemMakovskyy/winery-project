<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Orders')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2>Orders</h2>
<div th:replace="~{fragments/layout :: alerts}"></div>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.paymentStatus}"></td>
        <td>
            <form method="post"
                  th:action="@{'/ui/orders/' + ${order.id} + '/paid'}"
                  th:if="${order.paymentStatus.name() == 'PENDING'}">
                <button type="submit">Mark Paid</button>
            </form>

            <form method="post"
                  onsubmit="return confirm('Are you sure?');"
                  th:action="@{'/ui/orders/' + ${order.id} + '/delete'}">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
