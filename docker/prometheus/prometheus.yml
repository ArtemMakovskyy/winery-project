global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'wine-store-api'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['api-backend:8080']
        labels:
          application: 'wine-store'
#      - targets: ['host.docker.internal:8080']
#        labels:
#          application: 'wine-store (intellij)'

  - job_name: 'winery-admin-ui'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['winery-admin-ui:8081']
        labels:
          application: 'admin-ui'

rule_files:
  - "/etc/prometheus/rules.yml"
