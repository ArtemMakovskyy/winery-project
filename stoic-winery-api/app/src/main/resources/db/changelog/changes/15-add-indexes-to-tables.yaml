databaseChangeLog:
  - changeSet:
      id: add-indexes-to-tables
      author: artemmakovskyy
      comment: Add indexes for performance optimization
      changes:
        # Users table indexes
        - createIndex:
            indexName: idx_users_email
            tableName: users
            unique: true
            columns:
              - column:
                  name: email
        - createIndex:
            indexName: idx_users_telegram_chat_id
            tableName: users
            unique: true
            columns:
              - column:
                  name: telegram_chat_id
        - createIndex:
            indexName: idx_users_is_deleted
            tableName: users
            columns:
              - column:
                  name: is_deleted

        # Orders table indexes
        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_orders_order_number
            tableName: orders
            unique: true
            columns:
              - column:
                  name: order_number
        - createIndex:
            indexName: idx_orders_registration_time
            tableName: orders
            columns:
              - column:
                  name: registration_time
        - createIndex:
            indexName: idx_orders_is_deleted
            tableName: orders
            columns:
              - column:
                  name: is_deleted

        # Reviews table indexes
        - createIndex:
            indexName: idx_reviews_wine_id
            tableName: reviews
            columns:
              - column:
                  name: wine_id
        - createIndex:
            indexName: idx_reviews_user_id
            tableName: reviews
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_reviews_wine_id_user_id
            tableName: reviews
            columns:
              - column:
                  name: wine_id
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_reviews_is_deleted
            tableName: reviews
            columns:
              - column:
                  name: is_deleted

        # Wines table indexes
        - createIndex:
            indexName: idx_wines_vendor_code
            tableName: wines
            columns:
              - column:
                  name: vendor_code
        - createIndex:
            indexName: idx_wines_wine_type
            tableName: wines
            columns:
              - column:
                  name: wine_type
        - createIndex:
            indexName: idx_wines_wine_color
            tableName: wines
            columns:
              - column:
                  name: wine_color
        - createIndex:
            indexName: idx_wines_grape
            tableName: wines
            columns:
              - column:
                  name: grape
        - createIndex:
            indexName: idx_wines_is_deleted
            tableName: wines
            columns:
              - column:
                  name: is_deleted

        # Purchase objects table indexes
        - createIndex:
            indexName: idx_purchase_objects_wine_id
            tableName: purchase_objects
            columns:
              - column:
                  name: wine_id
        - createIndex:
            indexName: idx_purchase_objects_shopping_card_id
            tableName: purchase_objects
            columns:
              - column:
                  name: shopping_card_id
        - createIndex:
            indexName: idx_purchase_objects_is_deleted
            tableName: purchase_objects
            columns:
              - column:
                  name: is_deleted

        # Shopping cards table indexes
        - createIndex:
            indexName: idx_shopping_cards_order_id
            tableName: shopping_cards
            columns:
              - column:
                  name: order_id
        - createIndex:
            indexName: idx_shopping_cards_is_deleted
            tableName: shopping_cards
            columns:
              - column:
                  name: is_deleted

        # Orders delivery information table indexes
        - createIndex:
            indexName: idx_orders_delivery_information_order_id
            tableName: orders_delivery_information
            columns:
              - column:
                  name: order_id
        - createIndex:
            indexName: idx_orders_delivery_information_is_deleted
            tableName: orders_delivery_information
            columns:
              - column:
                  name: is_deleted

        # Users_roles table indexes (many-to-many)
        - createIndex:
            indexName: idx_users_roles_user_id
            tableName: users_roles
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_users_roles_role_id
            tableName: users_roles
            columns:
              - column:
                  name: role_id
