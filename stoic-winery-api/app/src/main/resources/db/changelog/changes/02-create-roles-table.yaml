databaseChangeLog:
  - changeSet:
      id: create-roles-table
      author: artemmakovskyy
      changes:
        - createTable:
            tableName: roles
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: ENUM('ROLE_ADMIN', 'ROLE_MANAGER', 'ROLE_CUSTOMER')
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
