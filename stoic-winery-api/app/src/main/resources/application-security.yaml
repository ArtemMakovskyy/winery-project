security:
  paths:
    - /auth/**
    - /error/**
    - /health/**
    - /wines/**
    - /reviews/**
    - /orders/**
    - /images/**
    - /wine/**
    - /actuator/**
    - /prometheus/**
    - /v3/api-docs/**
