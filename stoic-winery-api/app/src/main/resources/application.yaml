server:
  port: ${BACKEND_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: wine-store-service
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 20
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 50KB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3309/wine_store_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DATASOURCE_USER:wine_user}
    password: ${DATASOURCE_PASSWORD:dev_db_password_change_me}

  # Redis configuration for caching and session management
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:dev_redis_password_change_me}
      timeout: 2000ms  # Connection timeout
      lettuce:
        pool:
          max-active: 8   # Max connections in pool
          max-idle: 8     # Max idle connections
          min-idle: 2     # Min idle connections to keep ready
          max-wait: -1ms  # Wait indefinitely for connection

  config:
    import:
      - optional:classpath:/application-telegram.yaml
      - optional:classpath:/application-actuator.yaml
      - optional:classpath:/application-security.yaml
  web:
    resources:
      static-locations: file:/app/uploads/

image:
  save:
    path: ${IMAGE_SAVE_PATH:stoic-winery-api/uploads/images/wine/}
  config:
    path: ${UPLOAD_CONFIG_BASE_PATH:file:stoic-winery-api/uploads/images/}
  link:
    path: images/wine/

limiter:
  number:
    of:
      recorded:
        ratings: 100

main:
  back:
    end:
      url: ${BACKEND_URL:http://localhost:8080/api}
