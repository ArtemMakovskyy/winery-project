services:
  api-backend:
    env_file: .env
    container_name: be-api
    depends_on:
      db-sql:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
      redis:
        condition: service_started
    restart: on-failure
    build: ./stoic-winery-api
    ports:
      - "${BACKEND_PORT}:8080"
      - "${DEBUG_PORT}:5005"
    environment:
      SPRING_DATASOURCE_URL: ${DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${DATASOURCE_USER}
      SPRING_DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKEND_URL: ${BACKEND_URL_DOCKER}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT}
      LOKI_URL: ${LOKI_URL}
      IMAGE_SAVE_PATH: ${IMAGE_SAVE_PATH}
      UPLOAD_BASE_PATH: ${UPLOAD_BASE_PATH}
      JAVA_TOOL_OPTIONS: >
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    volumes:
      - wine_images:/app/uploads/images/wine
    networks:
      - backend

  winery-admin-ui:
    env_file: .env
    container_name: fe-ui-admin
    build: ./winery-admin-ui
    ports:
      - "${ADMIN_UI_PORT}:8081"
    environment:
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT}
      LOKI_URL: ${LOKI_URL}
      BACKEND_URL: ${BACKEND_URL_DOCKER}
    networks:
      - backend
    depends_on:
      - loki
      - tempo
      - api-backend

  frontend-wine-site:
    container_name: fe-ui
    env_file: .env
    build: ./wine_site_project
    ports:
      - "${FRONTEND_PORT}:3000"
    stdin_open: true
    tty: true
    networks:
      - frontend
      - backend

  db-sql:
    env_file: .env
    container_name: db-mysql
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.46.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=5GB
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - api-backend
    networks:
      - backend

  loki:
    container_name: loki
    image: grafana/loki:main
    command: [ '-config.file=/etc/loki/local-config.yaml' ]
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT}:3100"
    networks:
      - backend

  tempo:
    container_name: tempo
    image: grafana/tempo:2.2.2
    command: [ '-config.file=/etc/tempo.yaml' ]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "${TEMPO_PORT}:3200"
      - "${ZIPKIN_PORT}:9411"
    networks:
      - backend

  grafana:
    container_name: grafana
    image: grafana/grafana:12.0.0
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
      - api-backend
    networks:
      - backend

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  mysql_data:
  wine_images:
  loki_data:
  tempo_data:
  prometheus_data:
  grafana_data:
  redis_data: